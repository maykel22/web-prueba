<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Mi Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { oscuro: '#0f172a', medio: '#1e293b', acento: '#e11d48' } } } }
    </script>
</head>
<body class="bg-oscuro text-white min-h-screen">

    <!-- Mismo encabezado que index.html -->
    <header class="sticky top-0 z-50 bg-medio/90 backdrop-blur-sm border-b border-gray-800">
        <div class="container mx-auto px-4 py-3 flex flex-wrap items-center justify-between">
            <a href="index.html" class="text-2xl font-bold text-acento flex items-center gap-2">
                <i class="fa fa-play-circle"></i> MiStreaming
            </a>
            <nav class="hidden md:flex gap-6">
                <a href="index.html" class="font-medium hover:text-acento transition-colors">Inicio</a>
                <a href="catalogo.html" class="font-medium text-acento transition-colors">Catálogo</a>
                <a href="#" class="font-medium hover:text-acento transition-colors">Géneros</a>
            </nav>
            <div class="flex items-center gap-4">
                <a href="login.html" class="hover:text-acento transition-colors">Iniciar Sesión</a>
                <a href="registro.html" class="bg-acento hover:bg-acento/90 px-4 py-2 rounded-lg font-medium transition-colors">Registrarse</a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-6">Catálogo Completo</h1>

        <!-- Buscador y Filtros -->
        <div class="bg-medio rounded-xl p-6 mb-8">
            <div class="grid md:grid-cols-3 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium mb-2">Buscar título</label>
                    <div class="relative">
                        <input type="text" id="buscador" placeholder="Escribe el nombre de la película o serie..." 
                               class="w-full bg-oscuro border border-gray-700 rounded-lg px-4 py-3 pl-10 focus:outline-none focus:border-acento">
                        <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Género</label>
                    <select id="genero" class="w-full bg-oscuro border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-acento">
                        <option value="todos">Todos los géneros</option>
                        <option value="accion">Acción</option>
                        <option value="drama">Drama</option>
                        <option value="comedia">Comedia</option>
                        <option value="ciencia">Ciencia Ficción</option>
                        <option value="terror">Terror</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Resultados -->
        <div id="resultados" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <!-- Se cargan dinámicamente desde la base de datos / API -->
        </div>
    </main>

    <footer class="bg-medio py-8 border-t border-gray-800 mt-12">
        <div class="container mx-auto px-4 text-center text-gray-500">
            &copy; 2026 MiStreaming
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
